<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Particle Sphere</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #060a09; /* dark backdrop so the green pops, remove/adjust to match your site */
    overflow: hidden;
  }
  #sphere-container {
    width: 100%;
    height: 100vh;
    position: relative;
    cursor: none;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<div id="sphere-container">
  <canvas id="sphereCanvas"></canvas>
</div>

<script>
(function () {
  const canvas = document.getElementById('sphereCanvas');
  const ctx = canvas.getContext('2d');
  const container = document.getElementById('sphere-container');

  // ---- BRAND COLOR ----
  const BASE = { r: 0x2F, g: 0x7F, b: 0x6D }; // #2F7F6D

  function shade(factor) {
    // factor < 1 darkens, > 1 lightens, all within the same green family
    const r = Math.min(255, Math.max(0, BASE.r * factor));
    const g = Math.min(255, Math.max(0, BASE.g * factor));
    const b = Math.min(255, Math.max(0, BASE.b * factor));
    return { r, g, b };
  }

  let W, H, DPR;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = container.clientWidth;
    H = container.clientHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);

  // ---- Build sphere points (Fibonacci sphere for even distribution) ----
  const NUM_POINTS = 1800;
  const points = [];
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));

  for (let i = 0; i < NUM_POINTS; i++) {
    const y = 1 - (i / (NUM_POINTS - 1)) * 2; // -1..1
    const radiusAtY = Math.sqrt(1 - y * y);
    const theta = goldenAngle * i;
    const x = Math.cos(theta) * radiusAtY;
    const z = Math.sin(theta) * radiusAtY;
    points.push({
      x, y, z,
      twinkleSpeed: 0.4 + Math.random() * 1.8,
      twinklePhase: Math.random() * Math.PI * 2,
      baseSize: 0.6 + Math.random() * 1.5,
      shadeFactor: 0.65 + Math.random() * 0.85, // varies light/dark within green family
      // per-particle "displacement" state, used for cursor push effect
      dispX: 0, dispY: 0
    });
  }

  // ---- Mouse / interaction state ----
  let targetRotY = 0, targetRotX = 0;
  let rotY = 0, rotX = 0;
  let mouseX = 0, mouseY = 0;       // normalized -1..1
  let mousePX = null, mousePY = null; // pixel coords on canvas
  let hasMouse = false;
  let autoRotate = 0;

  function updateMouse(clientX, clientY) {
    const rect = container.getBoundingClientRect();
    mouseX = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouseY = ((clientY - rect.top) / rect.height) * 2 - 1;
    mousePX = clientX - rect.left;
    mousePY = clientY - rect.top;
    hasMouse = true;
    targetRotY = mouseX * 0.9;
    targetRotX = mouseY * 0.6;
  }

  container.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
  container.addEventListener('mouseleave', () => {
    hasMouse = false;
    targetRotY = 0;
    targetRotX = 0;
    mousePX = mousePY = null;
  });
  container.addEventListener('touchmove', (e) => {
    if (e.touches.length === 0) return;
    updateMouse(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  container.addEventListener('touchend', () => {
    hasMouse = false;
    targetRotY = 0;
    targetRotX = 0;
    mousePX = mousePY = null;
  });

  function project(p, rotX, rotY, scale, cx, cy) {
    let x = p.x, y = p.y, z = p.z;
    const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    let x1 = x * cosY + z * sinY;
    let z1 = -x * sinY + z * cosY;
    const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
    let y1 = y * cosX - z1 * sinX;
    let z2 = y * sinX + z1 * cosX;
    const perspective = 3.2;
    const scaleFactor = perspective / (perspective + z2);
    return {
      x: cx + x1 * scale * scaleFactor,
      y: cy + y1 * scale * scaleFactor,
      scale: scaleFactor,
      z: z2
    };
  }

  const REPEL_RADIUS = 90;   // px, how close cursor must be to push particles
  const REPEL_STRENGTH = 26; // px, max displacement

  let t = 0;
  function draw() {
    t += 0.016;
    ctx.clearRect(0, 0, W, H);

    autoRotate += hasMouse ? 0 : 0.0022;
    rotY += ((targetRotY + autoRotate) - rotY) * 0.06;
    rotX += (targetRotX - rotX) * 0.06;

    const cx = W / 2;
    const cy = H / 2;
    const scale = Math.min(W, H) * 0.34;

    const projected = points.map(p => {
      const proj = project(p, rotX, rotY, scale, cx, cy);

      // cursor proximity displacement (radial push away from cursor)
      let dx = 0, dy = 0;
      if (mousePX !== null) {
        const ddx = proj.x - mousePX;
        const ddy = proj.y - mousePY;
        const dist = Math.sqrt(ddx * ddx + ddy * ddy);
        if (dist < REPEL_RADIUS && dist > 0.01) {
          const force = (1 - dist / REPEL_RADIUS) * REPEL_STRENGTH;
          dx = (ddx / dist) * force;
          dy = (ddy / dist) * force;
        }
      }
      // smooth toward target displacement
      p.dispX += (dx - p.dispX) * 0.18;
      p.dispY += (dy - p.dispY) * 0.18;

      return { p, proj, fx: proj.x + p.dispX, fy: proj.y + p.dispY };
    });

    projected.sort((a, b) => a.proj.z - b.proj.z);

    ctx.globalCompositeOperation = 'lighter';

    for (const { p, proj, fx, fy } of projected) {
      const depthFactor = (proj.z + 1) / 2; // 0..1, back to front
      const twinkle = 0.5 + 0.5 * Math.sin(t * p.twinkleSpeed + p.twinklePhase);

      // proximity boost: particles near the cursor glow brighter/bigger
      let proximityBoost = 0;
      if (mousePX !== null) {
        const dist = Math.sqrt((fx - mousePX) ** 2 + (fy - mousePY) ** 2);
        if (dist < REPEL_RADIUS) proximityBoost = (1 - dist / REPEL_RADIUS);
      }

      const alpha = Math.min(1, (0.12 + depthFactor * 0.5) * (0.5 + twinkle * 0.5) + proximityBoost * 0.55);
      const size = p.baseSize * proj.scale * (0.7 + depthFactor * 0.6) * (1 + proximityBoost * 1.4);

      const c = shade(p.shadeFactor + proximityBoost * 0.9);

      ctx.beginPath();
      ctx.fillStyle = `rgba(${c.r | 0}, ${c.g | 0}, ${c.b | 0}, ${alpha.toFixed(3)})`;
      ctx.arc(fx, fy, Math.max(0.4, size), 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalCompositeOperation = 'source-over';

    // ambient core glow
    const glow = ctx.createRadialGradient(cx, cy, scale * 0.05, cx, cy, scale * 1.35);
    glow.addColorStop(0, `rgba(${BASE.r}, ${BASE.g}, ${BASE.b}, 0.14)`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx, cy, scale * 1.35, 0, Math.PI * 2);
    ctx.fill();

    // soft glow that follows the cursor itself
    if (mousePX !== null) {
      const cursorGlow = ctx.createRadialGradient(mousePX, mousePY, 0, mousePX, mousePY, REPEL_RADIUS * 1.4);
      cursorGlow.addColorStop(0, `rgba(${BASE.r + 60}, ${BASE.g + 60}, ${BASE.b + 40}, 0.16)`);
      cursorGlow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cursorGlow;
      ctx.beginPath();
      ctx.arc(mousePX, mousePY, REPEL_RADIUS * 1.4, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalCompositeOperation = 'source-over';

    requestAnimationFrame(draw);
  }

  resize();
  draw();
})();
</script>
</body>
</html>
